services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: key-facts-curator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - NYT_API_KEY=${NYT_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
